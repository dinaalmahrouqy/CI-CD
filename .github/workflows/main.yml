name: build and deploy

on: 
  push:
    branches:
      - main

jobs:
  build-deploy:
    name: build and deploy 
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v2

      - name: setup java
        uses: actions/setup-java@v3
        with:
          distribution: 'correcto'
          java-version: 17 

      - name: unit tests
        run: mvn -B test --file pom.xml

      - name: build the application
        run: |
          mvn clean 
          mvn -B package --file pom.xml 

  

